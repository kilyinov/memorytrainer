<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Decks')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div class="container">
    <div class="top-bar">
        <h1>My Decks</h1>
        <a href="/decks/new" class="btn btn-primary">New Deck</a>
    </div>

    <div th:if="${#lists.isEmpty(decks)}" class="empty-state">
        <p>You don't have any decks yet.</p>
        <a href="/decks/new" class="btn btn-primary">Create Your First Deck</a>
    </div>

    <div th:each="deck : ${decks}" class="card">
        <div class="card-header">
            <h3 th:text="${deck.name}"></h3>
            <div class="card-actions">
                <span class="badge" th:text="${#lists.size(deck.cards)} + ' cards'"></span>
                <a th:href="@{/decks/{id}/study(id=${deck.id})}" class="btn btn-success btn-sm"
                   th:if="${!#lists.isEmpty(deck.cards)}">Study</a>
                <a th:href="@{/decks/{id}/cards(id=${deck.id})}" class="btn btn-primary btn-sm">Cards</a>
                <a th:href="@{/decks/{id}/edit(id=${deck.id})}" class="btn btn-secondary btn-sm">Edit</a>
                <form th:action="@{/decks/{id}/delete(id=${deck.id})}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('Delete this deck and all its cards?')">Delete</button>
                </form>
            </div>
        </div>
        <p th:if="${deck.description}" th:text="${deck.description}"></p>
    </div>
</div>
</body>
</html>
