<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Deck')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div class="container">
    <h1 th:text="${deck.id != null ? 'Edit Deck' : 'New Deck'}"></h1>

    <div class="card">
        <form th:action="${deck.id != null ? '/decks/' + deck.id : '/decks'}" method="post" th:object="${deck}">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="e.g. Spanish Vocabulary">
                <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="form-group">
                <label for="description">Description (optional)</label>
                <textarea id="description" th:field="*{description}" rows="3"
                          placeholder="What is this deck about?"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="/decks" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
